# Alembic configuration. Most settings are read from env vars in alembic/env.py
# so we don't have a hard-coded database URL committed to git.
#
# Run migrations with:
#   uv run alembic revision --autogenerate -m "describe change"
#   uv run alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally NOT set here. env.py reads DATABASE_URL from
# the application's Settings so dev/staging/prod all use the same code path.

# File template used by `alembic revision`. Adds a YYYY-MM-DD prefix so the
# migration directory sorts chronologically when listed.
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# Run ruff format on generated migrations so they don't fail pre-commit.
hooks = ruff_format ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
