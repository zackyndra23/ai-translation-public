# Run `uv run pre-commit install` once after cloning to install the git hook.
# Hooks pinned to ruff/mypy versions that match pyproject.toml's dev deps.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # The local mypy install (with our pyproject config + project deps) gives
        # better results than mirrors-mypy's isolated env, so we run it via uv
        # instead. The hook below is the standard mirrors entry; the `language:
        # system` override delegates to our uv-managed mypy.
        additional_dependencies: []
        language: system
        entry: uv run mypy
        args: [src/]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
